<!doctype html>
<html lang="pt-BR">
 <head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Levi e Rebecca 2 Anos</title>
  <script src="https://cdn.tailwindcss.com/3.4.17"></script>
  <script src="https://cdn.jsdelivr.net/npm/lucide@0.263.0/dist/umd/lucide.min.js"></script>
  <script src="/_sdk/element_sdk.js"></script>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Poppins:wght@300;400;500;600&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: 'Poppins', sans-serif;
      background: linear-gradient(135deg, #121212 0%, #2a0845 100%);
      min-height: 100vh;
      color: white;
      overflow-x: hidden;
    }

    .spotify-card {
      background: #181818;
      border-radius: 12px;
      padding: 1.5rem;
      border: 1px solid rgba(255,255,255,0.1);
    }
    
    .progress-bar { height: 4px; width: 100%; background: #4f4f4f; border-radius: 2px; }
    .progress-fill { height: 100%; width: 45%; background: #1db954; border-radius: 2px; }

    .profile-circle {
      width: 220px;
      height: 220px;
      border-radius: 50%;
      border: 4px solid #9333ea;
      object-fit: cover;
      box-shadow: 0 0 30px rgba(147, 51, 234, 0.5);
    }

    .nav-tab {
      cursor: pointer;
      padding: 0.75rem 1.5rem;
      color: rgba(255, 255, 255, 0.6);
      transition: all 0.3s ease;
      border-bottom: 2px solid transparent;
    }
    .nav-tab.active { color: #a855f7; border-bottom-color: #a855f7; }

    .content-page { display: none; animation: fadeIn 0.5s ease forwards; }
    .content-page.active { display: block; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

    .card {
      background: rgba(255, 255, 255, 0.05);
      backdrop-filter: blur(12px);
      border-radius: 24px;
      padding: 2rem;
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    
    input, textarea {
      background: rgba(0, 0, 0, 0.3) !important;
      color: white !important;
      border: 1px solid rgba(255, 255, 255, 0.1) !important;
    }
    input:focus, textarea:focus {
      border-color: #9333ea !important;
      outline: none;
    }
  </style>
 </head>
 <body>
  <div class="main-wrapper flex flex-col min-h-screen">
   
   <header class="pt-10 pb-6 text-center">
    <h1 id="main-title" class="text-5xl md:text-6xl font-bold bg-gradient-to-r from-purple-400 to-pink-500 bg-clip-text text-transparent">Levi e Rebecca</h1>
    <p class="text-purple-300 mt-2 text-lg tracking-widest uppercase">2 Anos de História</p>
   </header>

   <nav class="flex justify-center gap-2 mb-8 border-b border-white/10 flex-wrap">
    <button class="nav-tab active" data-page="home">Início</button>
    <button class="nav-tab" data-page="declarations">Declarações</button>
    <button class="nav-tab" data-page="photos">Galeria</button>
    <button class="nav-tab" data-page="dates">Dates</button>
   </nav>

   <main class="flex-1 px-6 pb-20">
    
    <!-- PÁGINA INICIAL -->
    <div id="home" class="content-page active max-w-2xl mx-auto">
      <div class="flex flex-col items-center text-center">
        <div class="mb-10 relative">
          <img id="main-couple-photo" src="https://images.unsplash.com/photo-1516589174184-c68536575962?q=80&w=400&h=400&fit=crop" class="profile-circle" alt="Foto">
          <div class="absolute -bottom-2 -right-2 bg-purple-600 p-2 rounded-full shadow-lg">
            <i data-lucide="heart" class="fill-white text-white w-6 h-6"></i>
          </div>
        </div>

        <div class="spotify-card w-full max-w-md">
          <div class="flex items-center gap-4 mb-4 text-left">
            <div class="w-16 h-16 bg-gradient-to-br from-purple-600 to-pink-500 rounded shadow-lg flex items-center justify-center">
              <i data-lucide="music" class="text-white w-8 h-8"></i>
            </div>
            <div class="flex-1">
              <h3 id="main-song-title" class="font-bold text-white text-lg">Nossa Música</h3>
              <p id="main-song-artist" class="text-gray-400">Levi & Rebecca • Playlist do Casal</p>
            </div>
            <i data-lucide="heart" class="text-green-500 fill-green-500 w-5 h-5"></i>
          </div>
          <div class="space-y-2">
            <div class="progress-bar"><div class="progress-fill"></div></div>
            <div class="flex justify-between text-xs text-gray-400"><span>1:42</span><span>3:30</span></div>
          </div>
          <div class="flex justify-center items-center gap-6 mt-4">
            <i data-lucide="shuffle" class="text-gray-400 w-5 h-5"></i>
            <i data-lucide="skip-back" class="text-white fill-white w-6 h-6"></i>
            <div class="bg-white rounded-full p-3"><i data-lucide="play" class="text-black fill-black w-6 h-6"></i></div>
            <i data-lucide="skip-forward" class="text-white fill-white w-6 h-6"></i>
            <i data-lucide="repeat" class="text-gray-400 w-5 h-5"></i>
          </div>
        </div>
      </div>
    </div>

    <!-- PÁGINA: DECLARAÇÕES -->
    <div id="declarations" class="content-page max-w-4xl mx-auto">
     <div class="card">
      <h2 class="text-3xl font-bold mb-6 text-purple-400">💌 Mensagens</h2>
      <div class="bg-white/5 p-6 rounded-xl mb-8 border border-white/10">
       <textarea id="decl-content" placeholder="Escreva algo especial..." class="w-full p-3 rounded-lg mb-3" rows="3"></textarea>
       <div class="flex gap-3">
        <input type="text" id="decl-author" placeholder="Seu nome" class="flex-1 p-2 rounded-lg">
        <button onclick="addDeclaration()" class="px-6 py-2 bg-purple-600 hover:bg-purple-700 rounded-lg font-bold">Enviar</button>
       </div>
      </div>
      <div id="declarations-list" class="space-y-4"></div>
     </div>
    </div>

    <!-- PÁGINA: FOTOS -->
    <div id="photos" class="content-page max-w-4xl mx-auto">
      <div class="card">
        <h2 class="text-3xl font-bold mb-6 text-purple-400">📸 Galeria</h2>
        <div class="flex gap-2 mb-8">
          <input type="text" id="photo-url" placeholder="Link da foto (https://...)" class="flex-1 p-3 rounded-lg">
          <button onclick="addPhoto()" class="px-6 py-2 bg-purple-600 rounded-lg font-bold">Adicionar</button>
        </div>
        <div id="photos-grid" class="grid grid-cols-2 md:grid-cols-3 gap-4"></div>
      </div>
    </div>

    <!-- PÁGINA: DATES -->
    <div id="dates" class="content-page max-w-4xl mx-auto">
      <div class="card">
        <h2 class="text-3xl font-bold mb-6 text-purple-400">💕 Nossos Momentos</h2>
        <div class="bg-white/5 p-6 rounded-xl mb-8 border border-white/10">
          <input type="text" id="date-title" placeholder="Aonde fomos?" class="w-full p-3 rounded-lg mb-3">
          <textarea id="date-desc" placeholder="O que aconteceu de especial?" class="w-full p-3 rounded-lg mb-3" rows="2"></textarea>
          <button onclick="addDate()" class="w-full py-3 bg-purple-600 hover:bg-purple-700 rounded-lg font-bold">Registrar Date</button>
        </div>
        <div id="dates-list" class="space-y-4"></div>
      </div>
    </div>

   </main>
  </div>

  <script>
    let allData = [];

    // Inicialização do SDK
    async function init() {
      const result = await window.dataSdk.init({
        onDataChanged: (data) => {
          allData = data;
          renderAll();
        }
      });
    }
    init();

    // Navegação
    document.querySelectorAll('.nav-tab').forEach(tab => {
      tab.addEventListener('click', () => {
        document.querySelectorAll('.nav-tab').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.content-page').forEach(p => p.classList.remove('active'));
        tab.classList.add('active');
        document.getElementById(tab.dataset.page).classList.add('active');
      });
    });

    // Funções de Renderização
    function renderAll() {
      renderDeclarations();
      renderPhotos();
      renderDates();
      lucide.createIcons();
    }

    function renderDeclarations() {
      const container = document.getElementById('declarations-list');
      container.innerHTML = '';
      allData.filter(i => i.type === 'declaration').forEach(item => {
        container.innerHTML += `
          <div class="p-4 bg-white/5 border-l-4 border-purple-500 rounded-r-lg flex justify-between items-center group">
            <div><p>"${item.content}"</p><small class="text-purple-400">— ${item.author}</small></div>
            <button onclick="deleteItem('${item.__backendId}')" class="text-red-400 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2"></i></button>
          </div>`;
      });
    }

    function renderPhotos() {
      const container = document.getElementById('photos-grid');
      container.innerHTML = '';
      allData.filter(i => i.type === 'photo').forEach(item => {
        container.innerHTML += `
          <div class="relative aspect-square rounded-xl overflow-hidden group border border-white/10">
            <img src="${item.photoUrl}" class="w-full h-full object-cover">
            <button onclick="deleteItem('${item.__backendId}')" class="absolute top-2 right-2 bg-black/60 p-2 rounded-full opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2" class="w-4 h-4 text-red-400"></i></button>
          </div>`;
      });
    }

    function renderDates() {
      const container = document.getElementById('dates-list');
      container.innerHTML = '';
      allData.filter(i => i.type === 'date').forEach(item => {
        container.innerHTML += `
          <div class="p-5 bg-white/5 rounded-xl border border-white/10 flex justify-between items-start group">
            <div><h4 class="text-purple-400 font-bold">${item.dateTitle}</h4><p class="text-gray-300 text-sm">${item.dateDescription}</p></div>
            <button onclick="deleteItem('${item.__backendId}')" class="text-red-400 opacity-0 group-hover:opacity-100 transition"><i data-lucide="trash-2"></i></button>
          </div>`;
      });
    }

    // Ações de Criar
    async function addDeclaration() {
      const content = document.getElementById('decl-content').value;
      const author = document.getElementById('decl-author').value;
      if(content && author) {
        await window.dataSdk.create({ type: 'declaration', content, author });
        document.getElementById('decl-content').value = '';
        document.getElementById('decl-author').value = '';
      }
    }

    async function addPhoto() {
      const photoUrl = document.getElementById('photo-url').value;
      if(photoUrl) {
        await window.dataSdk.create({ type: 'photo', photoUrl });
        document.getElementById('photo-url').value = '';
      }
    }

    async function addDate() {
      const dateTitle = document.getElementById('date-title').value;
      const dateDescription = document.getElementById('date-desc').value;
      if(dateTitle && dateDescription) {
        await window.dataSdk.create({ type: 'date', dateTitle, dateDescription });
        document.getElementById('date-title').value = '';
        document.getElementById('date-desc').value = '';
      }
    }

    async function deleteItem(id) {
      const item = allData.find(i => i.__backendId === id);
      if(item) await window.dataSdk.delete(item);
    }

    // Configuração do Elemento (Editável)
    window.elementSdk?.init({
      onConfigChange: (config) => {
        if(config.main_title) document.getElementById('main-title').textContent = config.main_title;
        if(config.profile_img) document.getElementById('main-couple-photo').src = config.profile_img;
        if(config.main_song) document.getElementById('main-song-title').textContent = config.main_song;
      }
    });

    lucide.createIcons();
  </script>
 </body>
</html>
